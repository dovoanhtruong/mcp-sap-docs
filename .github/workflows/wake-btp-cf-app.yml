name: Wake up BTP CF app

# BTP trial subaccounts stop all running Cloud Foundry apps once per day to
# save resources. This workflow starts the app back up daily so it doesn't
# have to be started manually from the cockpit every morning.

on:
  schedule:
    # 05:00 Asia/Ho_Chi_Minh (UTC+7) = 22:00 UTC the previous day
    - cron: "0 22 * * *"
  workflow_dispatch:

concurrency:
  group: wake-btp-cf-app
  cancel-in-progress: false

permissions:
  contents: read

jobs:
  start-app:
    runs-on: ubuntu-22.04
    timeout-minutes: 15

    steps:
      - name: Preflight verify required secrets are present
        run: |
          set -euo pipefail
          for s in CF_API CF_ORG CF_SPACE CF_APP_NAME CF_USERNAME CF_PASSWORD CF_ORIGIN; do
            [ -n "${!s}" ] || { echo "Missing secret: $s"; exit 1; }
          done
        env:
          CF_API: ${{ secrets.CF_API }}
          CF_ORG: ${{ secrets.CF_ORG }}
          CF_SPACE: ${{ secrets.CF_SPACE }}
          CF_APP_NAME: ${{ secrets.CF_APP_NAME }}
          CF_USERNAME: ${{ secrets.CF_USERNAME }}
          CF_PASSWORD: ${{ secrets.CF_PASSWORD }}
          CF_ORIGIN: ${{ secrets.CF_ORIGIN }}

      - name: Install CF CLI (v8)
        run: |
          set -euo pipefail
          curl -fsSL "https://packages.cloudfoundry.org/stable?release=linux64-binary&version=v8&source=github" -o /tmp/cf.tgz
          tar -xzf /tmp/cf.tgz -C /tmp
          sudo mv /tmp/cf8 /usr/local/bin/cf
          cf --version

      - name: Log in and start the app
        env:
          CF_API: ${{ secrets.CF_API }}
          CF_ORG: ${{ secrets.CF_ORG }}
          CF_SPACE: ${{ secrets.CF_SPACE }}
          CF_APP_NAME: ${{ secrets.CF_APP_NAME }}
          CF_USERNAME: ${{ secrets.CF_USERNAME }}
          CF_PASSWORD: ${{ secrets.CF_PASSWORD }}
          CF_ORIGIN: ${{ secrets.CF_ORIGIN }}
        run: |
          set -euo pipefail
          cf api "$CF_API"
          cf auth "$CF_USERNAME" "$CF_PASSWORD" --origin "$CF_ORIGIN"
          cf target -o "$CF_ORG" -s "$CF_SPACE"
          cf start "$CF_APP_NAME"

      - name: Show app status
        if: always()
        env:
          CF_APP_NAME: ${{ secrets.CF_APP_NAME }}
        run: cf app "$CF_APP_NAME" || true
